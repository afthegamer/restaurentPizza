services:
  postgres:
    image: postgres:17
    container_name: restaurent-pizza-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pizza_admin
      POSTGRES_PASSWORD: pizza_secret
      POSTGRES_DB: restaurent_pizza
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
